!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartGrafic - Publicidad Creactiva</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Fondo animado sutil */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at top right, #1a1a1a 0%, #000 70%);
            z-index: -1;
        }

        /* Círculos decorativos de fondo */
        .blob {
            position: fixed;
            width: 300px;
            height: 300px;
            background: #facc15;
            filter: blur(80px);
            opacity: 0.1;
            z-index: -1;
            border-radius: 50%;
        }

        /* Estilo de los botones (Gris claro de la imagen) */
        .link-button {
            background-color: #e5e7eb;
            color: #000;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .link-button:hover {
            background-color: #ffffff;
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
        }

        /* Botón de WhatsApp */
        .whatsapp-button {
            background-color: #25d366;
            color: #ffffff;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .whatsapp-button:hover {
            background-color: #128c7e;
            transform: scale(1.05);
        }

        .logo-box {
            background-color: #000;
            border-radius: 2.5rem;
            padding: 1.5rem;
            box-shadow: 0 0 40px rgba(250, 204, 21, 0.1);
            border: 1px solid #222;
        }

        .fade-in {
            animation: fadeIn 0.8s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">

    <div class="bg-gradient"></div>
    <div class="blob" style="top: -100px; right: -100px;"></div>
    <div class="blob" style="bottom: -100px; left: -100px; background: #3b82f6;"></div>

    <div class="w-full max-w-md flex flex-col items-center fade-in">
        
        <!-- Contenedor del Logo -->
        <div class="logo-box mb-10 w-56 h-56 flex items-center justify-center overflow-hidden">
            <!-- Usamos un placeholder con estilo si la imagen no carga, pero aquí he puesto el nombre del archivo -->
            <img src="logo vertical.jpg" alt="SmartGrafic Logo" id="mainLogo" class="w-full h-full object-contain">
        </div>

        <!-- Enlaces Principales -->
        <div class="w-full space-y-4 mb-14">
            
            <a href="https://69dfd6207d23ed672982621b--neon-basbousa-851288.netlify.app/" target="_blank" class="link-button flex items-center justify-center w-full py-5 rounded-2xl text-xl">
                Cotizador NEON
            </a>

            <a href="https://www.facebook.com/profile.php?id=61576227491697&locale=es_LA" target="_blank" class="link-button flex items-center justify-center w-full py-5 rounded-2xl text-xl">
                Facebook
            </a>

            <a href="https://www.instagram.com/agenciagrafic/" target="_blank" class="link-button flex items-center justify-center w-full py-5 rounded-2xl text-xl">
                Instagram
            </a>

        </div>

        <!-- Botón de Acción Directa WhatsApp -->
        <div class="w-full">
            <a href="https://w.app/smartgrafic" target="_blank" class="whatsapp-button flex items-center justify-center w-full py-5 rounded-2xl text-lg gap-3 shadow-xl">
                <i class="fab fa-whatsapp text-3xl"></i>
                <span>HABLA CON UN ASESOR</span>
            </a>
        </div>

        <!-- Footer -->
        <footer class="mt-16 text-zinc-600 text-[10px] font-black tracking-[0.3em] uppercase">
            SmartGrafic • Publicidad Creactiva
        </footer>

    </div>

    <script>
        // Script para asegurar que el logo se vea si está en la misma carpeta o subido
        window.onload = function() {
            const logo = document.getElementById('mainLogo');
            logo.onerror = function() {
                // Si la imagen falla (porque no está en el servidor aún), 
                // mostramos un reemplazo visual para que no se vea el icono roto
                this.parentElement.innerHTML = `
                    <div class="flex flex-col items-center justify-center text-yellow-400">
                        <i class="fas fa-lightbulb text-6xl mb-2"></i>
                        <span class="font-bold text-sm tracking-tighter">SMART GRAFIC</span>
                    </div>
                `;
            };
        };
    </script>

</body>
</html>
